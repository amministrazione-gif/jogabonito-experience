<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joga Bonito Experience</title>
<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial,sans-serif}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero-logo{
width:min(78vw,340px);
animation:pulseLogo 2.5s ease-in-out infinite;
filter:drop-shadow(0 0 30px rgba(255,255,255,.46));
}
@keyframes pulseLogo{
0%,100%{transform:scale(1)}
50%{transform:scale(1.12)}
}
h1{font-size:clamp(38px,12vw,90px);text-transform:uppercase}
.buttons{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn{padding:14px 22px;border-radius:999px;text-decoration:none;color:white;border:1px solid #444}
.primary{background:#d7ff3f;color:black;border:none}
</style>
</head>
<body>
<section class="hero">
<img class="hero-logo" src="logo-joga.png" alt="Joga Bonito">
<h1>La notte di Torino, fatta dai giovani.</h1>
<div class="buttons">
<a class="btn primary" href="https://xceed.me/events/channel/mirko-staropoli-2">Metti in lista</a>
<a class="btn" href="https://wa.me/393286129173?text=Ciao,%20vorrei%20prenotare%20una%20serata">WhatsApp</a>
<a class="btn" href="https://www.instagram.com/jogabonito.experience/">Instagram</a>
</div>
</section>
</body>
</html>
